name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout (no LFS — tiết kiệm bandwidth)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: thuthaptoado/package-lock.json

      - name: Install frontend deps
        working-directory: thuthaptoado
        run: npm ci

      - name: Verify tiles đã build sẵn (admin chạy local trước khi push)
        run: |
          echo "=== Nội dung public/data/ ==="
          ls -lh thuthaptoado/public/data/ || true
          if [ ! -f thuthaptoado/public/data/manifest.json ]; then
            echo "❌ ERROR: thuthaptoado/public/data/manifest.json không tồn tại"
            echo "   Admin phải chạy CAP_NHAT_VA_DEPLOY.bat LOCAL trước khi push"
            exit 1
          fi
          TILES=$(ls thuthaptoado/public/data/tiles/ 2>/dev/null | wc -l)
          echo "✅ $TILES tile sẵn sàng"

      - name: Build app (tsc + vite build — KHÔNG rebuild tile)
        working-directory: thuthaptoado
        run: npm run build:app

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gis-evn-app
          directory: thuthaptoado/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
